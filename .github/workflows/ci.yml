name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Compile
        run: |
          python -m compileall src gui_entry.py
      - name: Test
        run: |
          python -m unittest discover -s tests -v
      - name: Web checks
        run: |
          powershell -ExecutionPolicy Bypass -File .\verify-web.ps1

  build-windows:
    runs-on: windows-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Build lightweight GUI
        shell: pwsh
        run: .\build-windows.ps1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OptimizerZero-windows
          path: dist/OptimizerZero
