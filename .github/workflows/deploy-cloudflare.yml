name: Deploy Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Cloudflare Pages branch name
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-${{ inputs.branch }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify Web Lite
        shell: pwsh
        run: ./verify-web.ps1
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web --project-name optimizerzero --branch ${{ inputs.branch }}
