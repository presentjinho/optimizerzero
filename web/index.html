<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OptimizerZero Web Lite</title>
    <meta name="description" content="파일을 서버에 올리지 않고 브라우저 안에서 안전하게 압축합니다." />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="theme-color" content="#111312" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="control-panel" aria-label="OptimizerZero controls">
        <div class="brand-block">
          <p class="eyebrow">local-first compression</p>
          <h1><span class="brand-name">OptimizerZero</span> <span class="brand-sub">Web Lite</span></h1>
          <p class="summary">
            ZIP, CBZ, EPUB, Office/OpenDocument, 이미지, PDF, 일반 파일을 로컬에서 처리합니다.
            원본은 보존하고 결과 파일만 새로 내려받습니다.
          </p>
          <p id="appStatus" class="status-pill">ready</p>
        </div>

        <label class="drop-zone" id="dropZone" tabindex="0" for="fileInput">
          <input id="fileInput" class="visually-hidden" type="file" multiple />
          <div class="drop-mark">OZ</div>
          <div>
            <strong>파일 추가</strong>
            <span>zip, cbz, epub, docx, pptx, xlsx, odt, ods, odp, jar, pdf, jpg, png, webp, bmp, gif, 기타 파일</span>
          </div>
        </label>

        <div class="strength-control">
          <div class="strength-header">
            <span>압축 강도 (드래그로 선택)</span>
            <b id="strengthLabel">기본 압축</b>
          </div>
          <input id="strength" type="range" min="1" max="7" step="1" value="4" aria-describedby="recommendation" />
          <div class="strength-ticks" aria-hidden="true">
            <span>나노</span>
            <span>살짝</span>
            <span>가벼움</span>
            <span>기본</span>
            <span>강함</span>
            <span>강력</span>
            <span>최대</span>
          </div>
        </div>

        <div id="recommendation" class="recommendation">
          기본 압축: 화질과 용량의 균형.
        </div>

        <details class="advanced-settings">
          <summary>고급 설정</summary>
          <div class="settings-grid">
            <label>
              <span>파일당 목표 용량</span>
              <select id="targetSize">
                <option value="0">제한 없음</option>
                <option value="5">5 MB</option>
                <option value="10">10 MB</option>
                <option value="25">25 MB</option>
                <option value="50">50 MB</option>
              </select>
            </label>
            <label>
              <span>최소 절감률</span>
              <select id="minSavings">
                <option value="0">0%</option>
                <option value="1" selected>1%</option>
                <option value="3">3%</option>
                <option value="5">5%</option>
              </select>
            </label>
            <label>
              <span>최대 입력 크기</span>
              <select id="limit">
                <option value="25">25 MB</option>
                <option value="75" selected>75 MB</option>
                <option value="150">150 MB</option>
              </select>
            </label>
            <label>
              <span>이미지 포맷 (이미지 파일만 적용, PDF/압축파일은 항상 WebP)</span>
              <select id="codec">
                <option value="auto" selected>자동 (추천)</option>
                <option value="webp">WebP</option>
                <option value="avif">AVIF</option>
                <option value="jxl">JPEG XL</option>
              </select>
              <span id="codecHint" class="field-hint">AVIF로 먼저 시도하고, 안 되면 WebP로 자동 대체합니다.</span>
            </label>
            <label>
              <span>동시 처리 개수</span>
              <select id="concurrency">
                <option value="auto" selected>자동 (이 PC 코어 수에 맞춤)</option>
                <option value="1">1개씩 (가장 안정적)</option>
                <option value="2">2개</option>
                <option value="4">4개</option>
                <option value="8">8개</option>
              </select>
              <span id="concurrencyHint" class="field-hint">여러 파일을 동시에 돌릴 스레드 수입니다. 높일수록 빠르지만 브라우저가 더 무거워질 수 있습니다.</span>
            </label>
          </div>
        </details>

        <div class="action-row">
          <button id="runButton" class="primary" type="button">시작</button>
          <button id="clearButton" type="button">비우기</button>
          <button id="reportButton" type="button" disabled>리포트</button>
          <button id="bundleButton" type="button" disabled>결과 ZIP</button>
        </div>

        <div class="meter" aria-label="progress">
          <div id="meterFill"></div>
        </div>
        <p id="etaText" class="field-hint eta-text"></p>
      </section>

      <section class="workspace" aria-label="File workspace">
        <div class="workspace-header">
          <div>
            <p class="eyebrow">queue</p>
            <h2>파일 목록</h2>
          </div>
          <p id="totals">0 files</p>
        </div>

        <div id="emptyState" class="empty-state">
          <p>아직 파일이 없습니다.</p>
          <span>작은 파일로 먼저 테스트해보세요. 원본은 건드리지 않습니다.</span>
        </div>

        <div id="fileList" class="file-list"></div>
      </section>
    </main>

    <template id="fileRowTemplate">
      <article class="file-row">
        <div class="file-main">
          <strong class="file-name"></strong>
          <span class="file-meta"></span>
        </div>
        <div class="file-status-wrap">
          <div class="file-status"></div>
          <div class="file-bar" hidden><div class="file-bar-fill"></div></div>
        </div>
        <button class="remove-button" type="button" title="목록에서 제거" aria-label="목록에서 제거">×</button>
        <button class="download-button" type="button" hidden>다운로드</button>
      </article>
    </template>

    <script src="./vendor/jszip.min.js"></script>
    <script src="./vendor/pdf-lib.min.js"></script>
    <script src="./optimize-core.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
