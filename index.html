<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OptimizerZero Web Lite</title>
    <meta name="description" content="파일을 서버에 올리지 않고 브라우저 안에서 안전하게 압축합니다." />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="theme-color" content="#111312" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="control-panel" aria-label="OptimizerZero controls">
        <div class="brand-block">
          <p class="eyebrow">local-first compression</p>
          <h1>OptimizerZero Web Lite</h1>
          <p class="summary">
            ZIP, CBZ, EPUB, Office/OpenDocument, 이미지, PDF, 일반 파일을 로컬에서 처리합니다.
            원본은 보존하고 결과 파일만 새로 내려받습니다.
          </p>
          <p id="appStatus" class="status-pill">ready</p>
        </div>

        <label class="drop-zone" id="dropZone" tabindex="0" for="fileInput">
          <input id="fileInput" class="visually-hidden" type="file" multiple />
          <div class="drop-mark">OZ</div>
          <div>
            <strong>파일 추가</strong>
            <span>zip, cbz, epub, docx, pptx, xlsx, odt, ods, odp, pdf, jpg, png, webp, 기타 파일</span>
          </div>
        </label>

        <div class="settings-grid">
          <label>
            <span>목적</span>
            <select id="intent">
              <option value="archive" data-message="보관 추천: 원본 보존, 무손실 중심, 큰 파일 허용.">보관 - 원본 보존</option>
              <option value="share" data-message="공유 추천: 균형 압축, 낮은 손실, 화질 88." selected>공유 - 균형 압축</option>
              <option value="messenger" data-message="메신저 추천: 용량 우선, 결과 확인 후 사용.">메신저 - 용량 우선</option>
              <option value="email" data-message="이메일 추천: 첨부 제한에 맞춤.">이메일 - 첨부 제한</option>
              <option value="quality" data-message="화질 추천: 거의 같게, 절감이 작으면 스킵.">화질 - 최소 손실</option>
            </select>
          </label>
          <label>
            <span>프로필</span>
            <select id="profile">
              <option value="safe">safe - 안전 우선</option>
              <option value="balanced" selected>balanced - 균형</option>
              <option value="strong">strong - 강한 압축</option>
            </select>
          </label>
          <label>
            <span>손실 허용</span>
            <select id="lossBudget">
              <option value="">목적에 맞춤</option>
              <option value="none">none - 원본 보존</option>
              <option value="low">low - 거의 같게</option>
              <option value="medium">medium - 균형</option>
              <option value="high">high - 용량 우선</option>
            </select>
          </label>
          <label>
            <span>이미지 화질 <b id="qualityLabel">88</b></span>
            <input id="quality" type="range" min="45" max="96" value="88" />
          </label>
          <label>
            <span>파일당 목표 용량</span>
            <select id="targetSize">
              <option value="0">제한 없음</option>
              <option value="5">5 MB</option>
              <option value="10">10 MB</option>
              <option value="25">25 MB</option>
              <option value="50">50 MB</option>
            </select>
          </label>
          <label>
            <span>최소 절감률</span>
            <select id="minSavings">
              <option value="0">0%</option>
              <option value="1" selected>1%</option>
              <option value="3">3%</option>
              <option value="5">5%</option>
            </select>
          </label>
          <label>
            <span>최대 입력 크기</span>
            <select id="limit">
              <option value="25">25 MB</option>
              <option value="75" selected>75 MB</option>
              <option value="150">150 MB</option>
            </select>
          </label>
        </div>

        <div id="recommendation" class="recommendation">
          공유 추천: 균형 압축, 낮은 손실, 화질 88.
        </div>

        <div class="action-row">
          <button id="runButton" class="primary" type="button">시작</button>
          <button id="clearButton" type="button">비우기</button>
          <button id="reportButton" type="button" disabled>리포트</button>
          <button id="bundleButton" type="button" disabled>결과 ZIP</button>
        </div>

        <div class="meter" aria-label="progress">
          <div id="meterFill"></div>
        </div>
      </section>

      <section class="workspace" aria-label="File workspace">
        <div class="workspace-header">
          <div>
            <p class="eyebrow">queue</p>
            <h2>파일 목록</h2>
          </div>
          <p id="totals">0 files</p>
        </div>

        <div id="emptyState" class="empty-state">
          <p>아직 파일이 없습니다.</p>
          <span>작은 파일로 먼저 테스트해보세요. 원본은 건드리지 않습니다.</span>
        </div>

        <div id="fileList" class="file-list"></div>
      </section>
    </main>

    <template id="fileRowTemplate">
      <article class="file-row">
        <div class="file-main">
          <strong class="file-name"></strong>
          <span class="file-meta"></span>
        </div>
        <div class="file-status"></div>
        <button class="remove-button" type="button" title="목록에서 제거" aria-label="목록에서 제거">×</button>
        <button class="download-button" type="button" hidden>다운로드</button>
      </article>
    </template>

    <script src="./vendor/jszip.min.js"></script>
    <script src="./vendor/pdf-lib.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
